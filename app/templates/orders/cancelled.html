{% extends "base.html" %}

{% block title %}{{ t('order_cancelled_title') }} – Haksüt34{% endblock %}

{% block content %}
<div style="max-width:480px;margin:2rem auto">
  <div class="card text-center">
    <div style="font-size:3rem;margin-bottom:1rem">❌</div>
    <h1 class="page-title">{{ t('order_cancelled_title') }}</h1>
    <p style="color:var(--text-muted);margin:0.5rem 0 1.5rem">{{ t('order_cancelled_text') }}</p>

    <div style="background:var(--bg);border-radius:var(--radius-sm);padding:0.9rem;margin-bottom:1.5rem">
      <div style="font-size:0.8rem;color:var(--text-muted);font-weight:700;margin-bottom:0.2rem">{{ t('cancelled_order_label') }}</div>
      <div style="font-weight:900;color:var(--danger);font-size:1.2rem;letter-spacing:1px">{{ order.order_number }}</div>
    </div>

    <a href="/" class="btn btn-primary">{{ t('back_to_shop') }}</a>
  </div>
</div>
{% endblock %}
