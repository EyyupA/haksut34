{% extends "base.html" %}

{% block title %}{{ t('lookup_title') }} – Haksüt34{% endblock %}

{% block content %}
<div style="max-width:480px;margin:2rem auto">
  <div class="card">
    <div style="text-align:center;margin-bottom:1.5rem">
      <div style="font-size:2.5rem;margin-bottom:0.5rem">🔍</div>
      <h1 class="page-title">{{ t('lookup_title') }}</h1>
      <p style="color:var(--text-muted);font-size:0.9rem">{{ t('lookup_desc') }}</p>
    </div>

    {% if error %}
    <div class="notice notice-danger">⚠️ {{ error }}</div>
    {% endif %}

    <form method="post" action="/bestellung/suchen">
      <div class="form-group">
        <label class="form-label">{{ t('lookup_order_number') }} <span class="required">*</span></label>
        <input type="text" name="order_number" class="form-input" required
          placeholder="{{ t('lookup_example') }}" style="font-family:monospace;letter-spacing:1px;font-weight:700">
        <div style="font-size:0.8rem;color:var(--text-muted);margin-top:0.25rem">{{ t('lookup_example') }}</div>
      </div>
      <div class="form-group">
        <label class="form-label">{{ t('lookup_email') }} <span class="required">*</span></label>
        <input type="email" name="customer_email" class="form-input" required placeholder="ihre@email.de">
      </div>
      <button type="submit" class="btn btn-primary btn-full">🔍 {{ t('lookup_submit') }}</button>
    </form>

    <div class="divider"></div>
    <div style="text-align:center;font-size:0.88rem;color:var(--text-muted)">
      {{ t('lookup_hint') }}
    </div>
  </div>
</div>
{% endblock %}
