<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ t('admin_login_title') }} – Haksüt34</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/custom.css">
</head>
<body style="background:linear-gradient(135deg,#1a1a2e,#16213e);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem">

<div class="card" style="max-width:380px;width:100%;text-align:center">
  <div style="font-size:2.5rem;margin-bottom:0.75rem">🥛</div>
  <h1 style="font-size:1.5rem;font-weight:900;margin:0 0 0.25rem;color:var(--primary)">Haksüt34</h1>
  <p style="color:var(--text-muted);font-size:0.88rem;margin-bottom:1.5rem">{{ t('admin_login_subtitle') }}</p>

  {% if error %}
  <div class="notice notice-danger" style="margin-bottom:1.25rem">⚠️ {{ error }}</div>
  {% endif %}

  <form method="post" action="/admin/login">
    <div class="form-group" style="text-align:left">
      <label class="form-label">{{ t('admin_username') }}</label>
      <input type="text" name="username" class="form-input" autofocus autocomplete="username" required>
    </div>
    <div class="form-group" style="text-align:left">
      <label class="form-label">{{ t('admin_password') }}</label>
      <input type="password" name="password" class="form-input" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full btn-lg">🔐 {{ t('admin_login_btn') }}</button>
  </form>

  <div style="margin-top:1.5rem;display:flex;justify-content:center;gap:0.5rem">
    <a href="/sprache/de" class="lang-btn {% if lang == 'de' %}active{% endif %}">DE</a>
    <a href="/sprache/tr" class="lang-btn {% if lang == 'tr' %}active{% endif %}">TR</a>
    <a href="/sprache/en" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
  </div>
</div>

</body>
</html>
